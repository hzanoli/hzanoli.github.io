{{ $posts := (where site.RegularPages "Section" "blog") | first 4 }}
{{ with $posts }}
<section class="blog" id="blog">
  <div class="section-header">
    <div class="section-title">Latest Posts</div>
    <div class="section-number">002 — WRITING</div>
  </div>
  <div class="blog-grid">
    {{ range . }}
    <a class="blog-card" href="{{ .RelPermalink }}">
      <div class="blog-meta">
        <span class="blog-date">{{ .Date.Format "2006.01.02" }}</span>
        {{ with .Params.tag }}<span class="blog-tag">{{ . }}</span>{{ end }}
      </div>
      <h3>{{ .Title }}</h3>
      <p>{{ .Params.description }}</p>
      <span class="blog-arrow">&rarr;</span>
    </a>
    {{ end }}
  </div>
</section>
{{ end }}
